<!doctype html>

<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Class Tests</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Urbanist&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Gabarito&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
		<link rel="stylesheet" type="text/css" href="/styles/style.css">
		<link rel="stylesheet" type="text/css" href="/styles/testpage.css">
	</head>
	<body>
    <div class="towerView">
      <div class="sizeSetter">
	      <div class="towerContainer">
			    <p class="towerName" id="towerName"></p>
			    <p class="upgradeName" id="upgradeName"></p>
			    <div class="towerImgContainer">
				    <img id="towerImg" class="towerImg">
			    </div>
			    <div id="iconedStats" class="iconedStats">
				    <template id="baseStatTemplate">
					  <div>
						  <img class="iconedStatImg">
						  <div class="iconedStatBox">
							  <p class="iconedStatText"> </p>
						  </div>
					  </div>
				    </template>
			    </div>
		    </div>
		    <h2 class="headerAttacks">Attacks</h2>
		    <template id="attackTemplate">
			  <div>
				  <p id="attackId" class="attackName"></p>
          <div class="grayBox">
				    <div class="attackStatContainer">
					    <template id="attackBoxTemplate">
						  <div>
							  <p></p>
							  <p class="attackStat"></p>
						  </div>
					    </template>
				    </div>
            <p class="footnote"></p>
          </div>
			  </div>
		    </template>
		    <div id="attacksContainer"></div>
      </div>
    </div>
	</body>
</html>

<script type="module" src="/scripts/testpage.js"></script>
